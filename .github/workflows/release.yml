name: Build & Release

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            platform: linux
            build_script: scripts/build-linux-release.sh
            artifact: zWork-linux-x86_64.AppImage
          - os: macos-latest
            platform: macos
            build_script: scripts/build-macos-release.sh
            artifact: zWork-macos-x86_64.dmg
          - os: windows-latest
            platform: windows
            build_script: scripts/build-windows-release.ps1
            artifact: zWork-windows-x86_64-setup.exe

    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Install frontend deps
        run: npm ci
        working-directory: app

      - name: Build (Linux/macOS)
        if: runner.os != 'Windows'
        run: bash ${{ matrix.build_script }}

      - name: Build (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: powershell -ExecutionPolicy Bypass -File ${{ matrix.build_script }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: dist/${{ matrix.artifact }}

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true
